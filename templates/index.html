<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mark Attendance — BioSecure AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* Hide the default file input entirely */
    #nativeCameraInput, #galleryInput {
        display: none;
    }
  </style>
</head>
<body class="pb-24 md:pb-8">

  <!-- TopAppBar -->
  <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-3 bg-[#0b1326]/70 backdrop-blur-xl border-b border-white/10 shadow-lg">
    <div class="flex items-center gap-3">
      <i data-lucide="scan-face" class="w-8 h-8 text-blue-500"></i>
      <h1 class="font-geist text-xl font-bold text-blue-400 tracking-tight">BioSecure AI</h1>
    </div>
    
    <!-- Desktop Navigation Links -->
    <nav class="hidden md:flex items-center gap-6">
      <a href="/" class="text-sm font-medium transition-colors hover:text-blue-400 text-blue-400">Home</a>
      <a href="/viewer" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">View Records</a>
      <a href="/students" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">All Students</a>
      <a href="/add_student" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">Add Student</a>
      {% if session_is_admin %}
      <a href="/admin" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">Admin Portal</a>
      {% endif %}
    </nav>

    <div class="flex items-center gap-4">
      <div class="hidden sm:flex items-center gap-2 px-3 py-1 bg-emerald-500/10 rounded-full border border-emerald-500/20">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="font-geist text-xs font-semibold text-emerald-400 uppercase tracking-wider">SYSTEM LIVE</span>
      </div>
      <span class="hidden lg:inline text-xs text-gray-400">Welcome, <strong class="text-gray-200">{{ session_username }}</strong></span>
      <a href="/logout" class="btn-danger-glass px-4 py-2 rounded-lg text-xs font-semibold flex items-center gap-2">
        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
      </a>
    </div>
  </header>

  <!-- BottomNavBar (Mobile Only) -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe md:hidden h-16 bg-[#131b2e]/85 backdrop-blur-lg border-t border-white/10 shadow-2xl">
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-blue-400" href="/">
      <i data-lucide="home" class="w-5 h-5 mb-0.5"></i>
      <span>Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-gray-400 hover:text-blue-300" href="/viewer">
      <i data-lucide="bar-chart-2" class="w-5 h-5 mb-0.5"></i>
      <span>Records</span>
    </a>
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-gray-400 hover:text-blue-300" href="/students">
      <i data-lucide="users" class="w-5 h-5 mb-0.5"></i>
      <span>Students</span>
    </a>
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-gray-400 hover:text-blue-300" href="/add_student">
      <i data-lucide="user-plus" class="w-5 h-5 mb-0.5"></i>
      <span>Add</span>
    </a>
  </nav>

  <main class="p-6 max-w-4xl mx-auto mt-20">
    
    <div class="glass-panel p-8 rounded-2xl max-w-2xl mx-auto inner-glow shadow-2xl">
      <div class="flex flex-col items-center mb-6">
        <div class="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center mb-3">
          <i data-lucide="scan" class="w-6 h-6 text-blue-500"></i>
        </div>
        <h2 class="text-2xl text-center font-geist font-bold text-white">Mark Attendance</h2>
        <p class="text-sm text-gray-400 text-center mt-1">Mark student attendance instantly via biometric face matching.</p>
      </div>

      <form id="uploadForm" class="space-y-6 mt-4">
        
        <!-- SESSION DETAILS -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Lecture Name</label>
                <input type="text" name="lecture" required placeholder="e.g. CS101" class="input-dark-glass w-full rounded-lg px-4 py-3 text-sm"/>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Section</label>
                <input type="text" name="section" required placeholder="e.g. A" class="input-dark-glass w-full rounded-lg px-4 py-3 text-sm"/>
            </div>
        </div>

        <!-- CAMERA ACTIONS -->
        <div class="pt-6 border-t border-white/10 mt-6">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Input Method</label>
            
            <div class="grid grid-cols-2 gap-4">
                <!-- Native Camera Trigger (Mobile Only) -->
                <button type="button" onclick="document.getElementById('nativeCameraInput').click()" 
                        class="flex sm:hidden flex-col items-center justify-center gap-3 py-6 bg-blue-600/20 border border-blue-500/40 rounded-xl hover:bg-blue-600/30 transition-all group shadow-sm">
                    <i data-lucide="camera" class="w-8 h-8 text-blue-400 group-hover:scale-110 transition-transform duration-200"></i>
                    <span class="text-sm font-medium text-white">Mobile Camera</span>
                </button>
                
                <!-- Desktop Webcam Trigger (Desktop/Tablet Only) -->
                <button type="button" id="openWebcamBtn"
                        class="hidden sm:flex flex-col items-center justify-center gap-3 py-6 bg-blue-600/20 border border-blue-500/40 rounded-xl hover:bg-blue-600/30 transition-all group shadow-sm">
                    <i data-lucide="monitor-play" class="w-8 h-8 text-blue-400 group-hover:scale-110 transition-transform duration-200"></i>
                    <span class="text-sm font-medium text-white">PC Webcam</span>
                </button>

                <!-- Gallery Trigger (Always visible) -->
                <button type="button" onclick="document.getElementById('galleryInput').click()" 
                        class="flex flex-col items-center justify-center gap-3 py-6 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all group shadow-sm">
                    <i data-lucide="image-plus" class="w-8 h-8 text-gray-400 group-hover:scale-110 transition-transform duration-200"></i>
                    <span class="text-sm font-medium text-white">Upload Files</span>
                </button>
            </div>

            <!-- Desktop Webcam Box -->
            <div id="desktopCameraBox" class="hidden mt-6 p-5 bg-[#0b1326]/60 rounded-2xl border border-white/10 flex-col items-center gap-4 shadow-inner relative overflow-hidden">
                <div class="relative rounded-lg overflow-hidden border border-white/10">
                    <!-- Scanner effect overlays -->
                    <div class="scan-line absolute left-0 w-full z-10"></div>
                    <div class="absolute top-4 left-4 w-6 h-6 border-t-2 border-l-2 border-blue-500"></div>
                    <div class="absolute top-4 right-4 w-6 h-6 border-t-2 border-r-2 border-blue-500"></div>
                    <div class="absolute bottom-4 left-4 w-6 h-6 border-b-2 border-l-2 border-blue-500"></div>
                    <div class="absolute bottom-4 right-4 w-6 h-6 border-b-2 border-r-2 border-blue-500"></div>
                    
                    <video id="video" autoplay playsinline class="w-full max-w-sm border border-white/5 shadow-md object-cover"></video>
                </div>
                <div class="flex gap-3 w-full max-w-sm mt-2">
                    <button type="button" id="captureWebcamBtn" class="flex-1 btn-primary-glass py-2.5 rounded-lg font-semibold text-sm flex items-center justify-center gap-2"><i data-lucide="aperture" class="w-4 h-4"></i> Capture</button>
                    <button type="button" id="closeWebcamBtn" class="flex-1 btn-secondary-glass py-2.5 rounded-lg font-semibold text-sm flex items-center justify-center gap-2"><i data-lucide="x" class="w-4 h-4"></i> Close</button>
                </div>
                <canvas id="canvas" class="hidden"></canvas>
            </div>
            
            <!-- Hidden File Inputs -->
            <input id="nativeCameraInput" type="file" name="images" accept="image/*" capture="environment" />
            <input id="galleryInput" type="file" name="images" accept="image/*" multiple />
            
            <!-- Main Input that holds the combined files for submission -->
            <input id="formFileInput" type="file" name="images" multiple class="hidden" />
        </div>

        <!-- PREVIEWS -->
        <div class="pt-4">
            <div id="previewBox" class="hidden grid grid-cols-4 sm:grid-cols-5 gap-3"></div>
            <p id="previewHint" class="text-xs text-center text-gray-500 mt-3 font-medium">No images selected</p>
        </div>

        <!-- SUBMIT -->
        <div class="pt-6 border-t border-white/10">
            <button type="submit" id="submitBtn" disabled
            class="w-full btn-primary-glass disabled:opacity-50 disabled:cursor-not-allowed text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2">
            <i data-lucide="scan-line" class="w-5 h-5"></i>
            <span id="submitBtnText">Scan & Mark Present</span>
            </button>
        </div>
      </form>
    </div>

    <!-- RESULT BOX -->
    <div id="result" class="w-full mt-8 space-y-6"></div>

  </main>

<script>
  // Initialize Lucide Icons
  lucide.createIcons();

  /* ------------------------------
        IMAGE PREVIEWS & FILE HANDLING
  ------------------------------- */
  const previewBox = document.getElementById("previewBox");
  const previewHint = document.getElementById("previewHint");
  const nativeCameraInput = document.getElementById("nativeCameraInput");
  const galleryInput = document.getElementById("galleryInput");
  const formFileInput = document.getElementById("formFileInput");
  const submitBtn = document.getElementById("submitBtn");
  const submitBtnText = document.getElementById("submitBtnText");
  
  // We use DataTransfer to programmatically manage files from multiple input sources
  let dataTransfer = new DataTransfer();

  /* ------------------------------
        DESKTOP WEBCAM LOGIC
  ------------------------------- */
  const openWebcamBtn = document.getElementById("openWebcamBtn");
  const desktopCameraBox = document.getElementById("desktopCameraBox");
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const captureWebcamBtn = document.getElementById("captureWebcamBtn");
  const closeWebcamBtn = document.getElementById("closeWebcamBtn");
  
  let stream = null;

  async function startWebcam() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        desktopCameraBox.classList.remove("hidden");
        desktopCameraBox.classList.add("flex");
    } catch (err) {
        console.error("Camera error:", err);
        alert("Could not access webcam. Please ensure permissions are granted.");
    }
  }

  function stopWebcam() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    desktopCameraBox.classList.add("hidden");
    desktopCameraBox.classList.remove("flex");
  }

  openWebcamBtn.addEventListener("click", () => {
    if (desktopCameraBox.classList.contains("hidden")) {
        startWebcam();
    } else {
        stopWebcam();
    }
  });

  closeWebcamBtn.addEventListener("click", stopWebcam);

  captureWebcamBtn.addEventListener("click", () => {
    if (!stream) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
      const file = new File([blob], `webcam_${Date.now()}.jpg`, { type: "image/jpeg" });
      handleFileSelection([file]);
      
      // Provide visual feedback
      const originalHTML = captureWebcamBtn.innerHTML;
      captureWebcamBtn.innerHTML = `<i data-lucide="check-circle-2" class="w-4 h-4"></i> Captured!`;
      lucide.createIcons();
      setTimeout(() => { 
          captureWebcamBtn.innerHTML = originalHTML; 
          lucide.createIcons();
      }, 1000);
    }, "image/jpeg", 0.9);
  });


  nativeCameraInput.addEventListener("change", (e) => handleFileSelection(e.target.files));
  galleryInput.addEventListener("change", (e) => handleFileSelection(e.target.files));

  function handleFileSelection(files) {
    if (!files || files.length === 0) return;
    
    // Add new files to our DataTransfer object
    Array.from(files).forEach(file => {
        dataTransfer.items.add(file);
    });
    
    // Update the master hidden input that will be submitted
    formFileInput.files = dataTransfer.files;
    
    // Enable submit button
    submitBtn.disabled = false;
    
    updatePreviews();
  }

  function updatePreviews() {
    previewBox.innerHTML = "";
    const files = formFileInput.files;
    
    if (files.length > 0) {
        previewBox.classList.remove("hidden");
        previewHint.innerText = `${files.length} image(s) ready to process. Tap to remove.`;
        submitBtnText.innerText = `Scan & Mark Present (${files.length})`;
    } else {
        previewBox.classList.add("hidden");
        previewHint.innerText = "No images selected.";
        submitBtnText.innerText = "Scan & Mark Present";
        submitBtn.disabled = true;
    }

    Array.from(files).forEach((file, index) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const container = document.createElement("div");
        container.className = "relative group cursor-pointer aspect-square rounded overflow-hidden border border-gray-600";
        container.onclick = () => removeFile(index);
        
        const img = document.createElement("img");
        img.src = ev.target.result;
        img.className = "w-full h-full object-cover";
        
        const overlay = document.createElement("div");
        overlay.className = "absolute inset-0 bg-red-600/80 flex items-center justify-center opacity-0 hover:opacity-100 transition";
        overlay.innerHTML = "<i data-lucide='trash-2' class='text-white w-8 h-8'></i>";
        
        container.appendChild(img);
        container.appendChild(overlay);
        previewBox.appendChild(container);
        lucide.createIcons();
      };
      reader.readAsDataURL(file);
    });
  }
  
  function removeFile(indexToRemove) {
      const newDt = new DataTransfer();
      const files = formFileInput.files;
      for (let i = 0; i < files.length; i++) {
          if (i !== indexToRemove) {
              newDt.items.add(files[i]);
          }
      }
      dataTransfer = newDt; // update global reference
      formFileInput.files = dataTransfer.files;
      
      // Reset the actual inputs so change event fires even if same file selected again
      nativeCameraInput.value = "";
      galleryInput.value = "";
      
      updatePreviews();
  }


  /* ------------------------------
        ATTENDANCE SUBMIT
  ------------------------------- */
  const form = document.getElementById("uploadForm");
  const resultBox = document.getElementById("result");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (formFileInput.files.length === 0) return;

    // Use FormData but replace 'images' from native/gallery inputs with our master formFileInput
    const formData = new FormData(form);
    formData.delete('images'); // remove duplicates
    
    Array.from(formFileInput.files).forEach(file => {
        formData.append('images', file);
    });

    // Loading UI
    submitBtn.disabled = true;
    const originalBtnHTML = submitBtn.innerHTML;
    submitBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>Processing...</span>`;
    lucide.createIcons();
    resultBox.innerHTML = ``;

    try {
        const res = await fetch("/upload_photo", { method: "POST", body: formData });
        const data = await res.json();

        window.currentSessionAttendance = data.session_attendance || [];

        let html = "";
        data.images.forEach((img, idx) => {
          html += `
            <div class="dark-card p-6 rounded-lg mb-6">
              <div class="rounded mb-4 overflow-hidden border border-gray-700">
                  <img src="${img.annotated}" class="w-full h-auto object-cover"/>
              </div>
              <div class="grid sm:grid-cols-2 gap-4">
          `;

          if (img.results.length === 0) {
              html += `<div class="p-3 bg-red-900 border border-red-600 rounded text-center text-sm text-red-200 col-span-2">No faces detected</div>`;
          }

          img.results.forEach(r => {
            let isPresent = r.status.includes('Present');
            let statusColor = isPresent ? 'text-green-400' : 'text-red-400';
            
            html += `
              <div class="p-3 bg-gray-800 rounded border border-gray-700">
                <p class="font-bold text-gray-200">${r.name}</p>
                <p class="text-sm ${statusColor}">${r.status}</p>
                <p class="text-xs text-purple-300 mt-1">${(parseFloat(r.confidence)*100).toFixed(0)}% Match</p>
                ${r.timestamp ? `<p class="text-xs text-gray-500 mt-1">${r.timestamp.split(' ')[1]}</p>` : ""}
              </div>
            `;
          });

          html += `</div></div>`;
        });

        // Add CSV Download Button
        if (window.currentSessionAttendance.length > 0) {
            html += `
              <div class="flex justify-center mt-6 mb-8">
                <button id="downloadCsvBtn"
                    class="bg-green-600 hover:bg-green-500 text-white px-6 py-3 rounded font-bold transition flex justify-center items-center gap-2 neon-button">
                    <i data-lucide="download" class="w-5 h-5"></i> Download CSV Report
                </button>
              </div>
            `;
        } else {
             html += `<p class="text-center text-sm text-gray-500 mb-8 mt-4">No successful attendance marks this session.</p>`;
        }

        resultBox.innerHTML = html;
        lucide.createIcons();
        
        // Reset form completely on success
        dataTransfer = new DataTransfer();
        formFileInput.files = dataTransfer.files;
        nativeCameraInput.value = "";
        galleryInput.value = "";
        form.reset();
        updatePreviews();

    } catch (err) {
        console.error(err);
        resultBox.innerHTML = `<div class="p-3 bg-red-900 border border-red-600 text-red-200 rounded text-center text-sm">Server error during analysis.</div>`;
    } finally {
        // Restore submit button
        submitBtn.innerHTML = originalBtnHTML;
    }
  });


  /* ------------------------------
        DOWNLOAD CSV
  ------------------------------- */
  document.addEventListener("click", (e) => {
    // We use closest or id depending on the click target
    const btn = e.target.closest("#downloadCsvBtn") || e.target.id === "downloadCsvBtn" ? e.target : null;
    
    if (btn) {
      const tableData = window.currentSessionAttendance;
      if (!tableData || !tableData.length) return alert("No attendance to download.");

      // Generate CSV string
      let csvContent = "data:text/csv;charset=utf-8,";
      // Header matching what backend returned
      csvContent += "Student_ID,Name,Program,Branch,Mobile,Status,Timestamp,Lecture,Section\n";
      
      tableData.forEach(row => {
          // Wrap elements in quotes to handle commas
          let formattedRow = row.map(e => `"${e}"`).join(",");
          csvContent += formattedRow + "\n";
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `Attendance_Report_${timestamp}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  });

</script>

</body>
</html>
