<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Records — BioSecure AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.4.1/css/responsive.dataTables.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
  <script src="https://cdn.datatables.net/responsive/2.4.1/js/dataTables.responsive.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>

  <style>
    /* DataTables Dark Mode Overrides */
    .dataTables_wrapper .dataTables_filter input,
    .dataTables_wrapper .dataTables_length select,
    .dataTables_wrapper .dataTables_info,
    .dataTables_wrapper .dataTables_paginate .paginate_button {
        color: #dae2fd !important;
    }
    .dataTables_wrapper .dataTables_filter input {
        background: rgba(11, 19, 38, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 8px !important;
        padding: 4px 10px !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #dae2fd !important;
        border-radius: 6px !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }
    .dataTables_wrapper .dataTables_paginate .current {
        background: #3b82f6 !important;
        border-color: #3b82f6 !important;
        color: white !important;
    }
    #attendanceTable {
        background-color: transparent !important;
        border-collapse: collapse !important;
    }
    #attendanceTable thead {
        background-color: rgba(255, 255, 255, 0.03) !important;
    }
    #attendanceTable th {
        color: #ffffff !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        font-family: 'Geist', sans-serif;
        font-weight: 600;
    }
    #attendanceTable tbody tr {
        background-color: transparent !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
    }
    #attendanceTable tbody tr:hover {
        background-color: rgba(255, 255, 255, 0.02) !important;
    }
  </style>
</head>

<body class="pb-24 md:pb-8">

  <!-- TopAppBar -->
  <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-3 bg-[#0b1326]/70 backdrop-blur-xl border-b border-white/10 shadow-lg">
    <div class="flex items-center gap-3">
      <i data-lucide="scan-face" class="w-8 h-8 text-blue-500"></i>
      <h1 class="font-geist text-xl font-bold text-blue-400 tracking-tight">BioSecure AI</h1>
    </div>
    
    <!-- Desktop Navigation Links -->
    <nav class="hidden md:flex items-center gap-6">
      <a href="/" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">Home</a>
      <a href="/viewer" class="text-sm font-medium transition-colors hover:text-blue-400 text-blue-400">View Records</a>
      <a href="/students" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">All Students</a>
      <a href="/add_student" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">Add Student</a>
      {% if session_is_admin %}
      <a href="/admin" class="text-sm font-medium transition-colors hover:text-blue-400 text-gray-300">Admin Portal</a>
      {% endif %}
    </nav>

    <div class="flex items-center gap-4">
      <div class="hidden sm:flex items-center gap-2 px-3 py-1 bg-emerald-500/10 rounded-full border border-emerald-500/20">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="font-geist text-xs font-semibold text-emerald-400 uppercase tracking-wider">SYSTEM LIVE</span>
      </div>
      <span class="hidden lg:inline text-xs text-gray-400">Welcome, <strong class="text-gray-200">{{ session_username }}</strong></span>
      <a href="/logout" class="btn-danger-glass px-4 py-2 rounded-lg text-xs font-semibold flex items-center gap-2">
        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
      </a>
    </div>
  </header>

  <!-- BottomNavBar (Mobile Only) -->
  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe md:hidden h-16 bg-[#131b2e]/85 backdrop-blur-lg border-t border-white/10 shadow-2xl">
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-gray-400 hover:text-blue-300" href="/">
      <i data-lucide="home" class="w-5 h-5 mb-0.5"></i>
      <span>Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-blue-400" href="/viewer">
      <i data-lucide="bar-chart-2" class="w-5 h-5 mb-0.5"></i>
      <span>Records</span>
    </a>
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-gray-400 hover:text-blue-300" href="/students">
      <i data-lucide="users" class="w-5 h-5 mb-0.5"></i>
      <span>Students</span>
    </a>
    <a class="flex flex-col items-center justify-center text-xs font-medium transition-all text-gray-400 hover:text-blue-300" href="/add_student">
      <i data-lucide="user-plus" class="w-5 h-5 mb-0.5"></i>
      <span>Add</span>
    </a>
  </nav>

  <main class="p-6 max-w-7xl mx-auto mt-20">
    <div class="glass-panel shadow-2xl p-8 rounded-2xl inner-glow">
      <div class="flex flex-wrap justify-between items-center mb-6 gap-4 border-b border-white/10 pb-4">
          <div class="flex items-center gap-2">
              <i data-lucide="calendar" class="w-6 h-6 text-blue-400"></i>
              <h2 class="text-xl font-bold font-geist text-white">Attendance Archives</h2>
          </div>
          <button id="todayBtn" class="btn-primary-glass px-5 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
              <i data-lucide="calendar-days" class="w-4 h-4"></i> View Today Only
          </button>
      </div>

      <div class="glass-card p-4 rounded-xl mb-6 shadow-inner flex flex-col md:flex-row flex-wrap gap-4 items-center justify-between">
          <button id="downloadFilteredCsvBtn" class="btn-primary-glass px-6 py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2">
            <i data-lucide="download" class="w-4 h-4"></i> Download CSV Report
          </button>
          
          <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
            <select id="statusFilter" class="input-dark-glass px-4 py-2 rounded-lg text-sm w-full sm:w-auto">
              <option value="">Filter by Status</option>
              <option value="Present">Present</option>
              <option value="Already Marked">Already Marked</option>
            </select>

            <select id="lectureFilter" class="input-dark-glass px-4 py-2 rounded-lg text-sm w-full sm:w-auto">
              <option value="">Filter by Lecture</option>
            </select>

            <select id="sectionFilter" class="input-dark-glass px-4 py-2 rounded-lg text-sm w-full sm:w-auto">
              <option value="">Filter by Section</option>
            </select>
          </div>
      </div>

      <table id="attendanceTable" class="display nowrap w-full text-sm">
        <thead>
          <tr>
            <th class="py-3 px-4 text-left">Student ID</th>
            <th class="py-3 px-4 text-left">Name</th>
            <th class="py-3 px-4 text-left">Program</th>
            <th class="py-3 px-4 text-left">Branch</th>
            <th class="py-3 px-4 text-left">Mobile</th>
            <th class="py-3 px-4 text-left">Status</th>
            <th class="py-3 px-4 text-left">Timestamp</th>
            <th class="py-3 px-4 text-left">Lecture</th>
            <th class="py-3 px-4 text-left">Section</th>
          </tr>
        </thead>
      </table>
    </div>
  </main>

<script>
  let attendanceTable;
  let todayFilterActive = false; // toggle state

  $(document).ready(function () {
    lucide.createIcons();
    attendanceTable = $('#attendanceTable').DataTable({
      ajax: {
        url: "/get_attendance_data",
        dataSrc: ""
      },
      columns: [
        { data: 0 },
        { data: 1 },
        { data: 2 },
        { data: 3 },
        { data: 4 },
        { data: 5, 
          "render": function (data, type, row) {
                if (type === 'display') {
                    let className = 'font-semibold px-2.5 py-1 rounded-full text-xs';
                    if (data === 'Present') {
                        className += ' bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
                    } else if (data === 'Already Marked') {
                        className += ' bg-amber-500/10 text-amber-400 border border-amber-500/20';
                    } else {
                        className += ' bg-rose-500/10 text-rose-400 border border-rose-500/20';
                    }
                    return `<span class="${className}">${data}</span>`;
                }
                return data;
            }
        },
        { data: 6 },
        { data: 7 },
        { data: 8 }
      ],
      responsive: false,
      scrollX: true,
      dom: 'Bfrtip',
      buttons: [
        {
          extend: 'collection',
          text: 'Export Data ⬇',
          buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
          className: 'bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-lg font-semibold transition duration-300 transform hover:shadow-lg neon-button'
        }
      ],
      initComplete: function () {
        let lectureSet = new Set();
        let sectionSet = new Set();

        this.api().rows().every(function () {
          let data = this.data();
          lectureSet.add(data[7]);
          sectionSet.add(data[8]);
        });

        lectureSet.forEach(l => $("#lectureFilter").append(`<option value="${l}">${l}</option>`));
        sectionSet.forEach(s => $("#sectionFilter").append(`<option value="${s}">${s}</option>`));
      }
    });

    $("#downloadFilteredCsvBtn").click(function () {
      $(this).addClass('animate-pulse-once');
      setTimeout(() => $(this).removeClass('animate-pulse-once'), 1000);

      const tableData = attendanceTable.rows({ search: 'applied' }).data().toArray();
      
      if (!tableData || !tableData.length) {
        alert("No attendance records to download in the current filter.");
        return;
      }

      let csvContent = "data:text/csv;charset=utf-8,";
      csvContent += "Student_ID,Name,Program,Branch,Mobile,Status,Timestamp,Lecture,Section\n";
      
      tableData.forEach(row => {
          let formattedRow = row.map(e => `"${e}"`).join(",");
          csvContent += formattedRow + "\n";
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `Filtered_Attendance_Report_${timestamp}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    $("#statusFilter, #lectureFilter, #sectionFilter").on("change", function () {
        $(this).addClass('border-4 border-yellow-300');
        setTimeout(() => $(this).removeClass('border-4 border-yellow-300'), 500);
    });

    $("#statusFilter").on("change", function () {
      attendanceTable.column(5).search(this.value).draw();
    });

    $("#lectureFilter").on("change", function () {
      attendanceTable.column(7).search(this.value).draw();
    });

    $("#sectionFilter").on("change", function () {
      attendanceTable.column(8).search(this.value).draw();
    });

    $("#todayBtn").on("click", function () {
      const today = new Date().toISOString().split("T")[0];

      if (!todayFilterActive) {
        attendanceTable.column(6).search(today).draw();
        $(this).text("✅ Showing Today (Clear Filter)");
        $(this).removeClass("bg-indigo-600 hover:bg-indigo-700").addClass("bg-red-600 hover:bg-red-700");
        todayFilterActive = true;
      } else {
        attendanceTable.column(6).search("").draw();
        $(this).text("📅 View Today's Events Only");
        $(this).removeClass("bg-red-600 hover:bg-red-700").addClass("bg-indigo-600 hover:bg-indigo-700");
        todayFilterActive = false;
      }
    });
  });
</script>

</body>
</html>
