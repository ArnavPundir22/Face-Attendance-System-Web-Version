# nginx/nginx.conf
#
# Nginx reverse-proxy configuration for Face Attendance System.
#
# Prerequisites
# -------------
# 1. Install Nginx:          sudo apt install nginx
# 2. Install Gunicorn:       pip install gunicorn
# 3. Start Gunicorn:         gunicorn app:app -w 1 -b 127.0.0.1:8000
# 4. Copy (or symlink) this file:
#      sudo cp nginx/nginx.conf /etc/nginx/sites-available/face-attendance
#      sudo ln -s /etc/nginx/sites-available/face-attendance \
#                 /etc/nginx/sites-enabled/face-attendance
#      sudo nginx -t && sudo systemctl reload nginx
#
# For TLS (HTTPS) with Let's Encrypt:
#      sudo certbot --nginx -d your.domain.com
#
# Adjust the paths marked with <CHANGE> below before deploying.
# ----------------------------------------------------------------

upstream flask_app {
    # Gunicorn listens on this address (single worker for SQLite safety).
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;  # Replace with your domain, e.g. attendance.example.com

    # ----------------------------------------------------------------
    # Upload size limit (must be >= what Flask accepts).
    # Increase if you allow large group photos.
    # ----------------------------------------------------------------
    client_max_body_size 20M;

    # ----------------------------------------------------------------
    # Serve static files directly — no Flask overhead.
    # <CHANGE> Set this to the absolute path of your project's static/ directory.
    # ----------------------------------------------------------------
    location /static/ {
        alias /var/www/face-attendance/static/;  # <CHANGE>
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ----------------------------------------------------------------
    # Proxy all other requests to Gunicorn.
    # ----------------------------------------------------------------
    location / {
        proxy_pass         http://flask_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — face recognition can be slow; give it enough headroom.
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    # Uncomment after enabling HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----------------------------------------------------------------
    # Hide Nginx version in error pages and headers.
    # ----------------------------------------------------------------
    server_tokens off;

    # ----------------------------------------------------------------
    # Logging
    # ----------------------------------------------------------------
    access_log /var/log/nginx/face-attendance-access.log;
    error_log  /var/log/nginx/face-attendance-error.log warn;
}

